<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 主渐变：紫色到青色 -->
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>

    <!-- 魔法光效渐变 -->
    <linearGradient id="magicGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EC4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F472B6;stop-opacity:1" />
    </linearGradient>

    <!-- 星星闪光渐变 -->
    <linearGradient id="starGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FBBF24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FCD34D;stop-opacity:1" />
    </linearGradient>

    <!-- 书本渐变 -->
    <linearGradient id="bookGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>

    <!-- 精灵身体渐变 -->
    <linearGradient id="spriteGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FDF2F8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FCE7F3;stop-opacity:1" />
    </linearGradient>

    <!-- 发光滤镜 -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景光晕 -->
  <circle cx="32" cy="32" r="28" fill="url(#mainGradient)" opacity="0.15" />

  <!-- 书本（打开状态）-->
  <g transform="translate(16, 28)">
    <!-- 书本左侧 -->
    <path d="M0 4 L14 2 L14 20 L0 22 Z" fill="url(#bookGradient)" />
    <!-- 书本右侧 -->
    <path d="M16 2 L32 4 L32 22 L16 20 Z" fill="url(#bookGradient)" />
    <!-- 书脊 -->
    <rect x="14" y="2" width="2" height="20" fill="rgba(255,255,255,0.3)" />
    <!-- 书页细节 - 左侧 -->
    <line x1="2" y1="8" x2="10" y2="8" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round" />
    <line x1="2" y1="12" x2="8" y2="12" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round" />
    <line x1="2" y1="16" x2="12" y2="16" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round" />
    <!-- 书页细节 - 右侧 -->
    <line x1="18" y1="8" x2="30" y2="8" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round" />
    <line x1="22" y1="12" x2="30" y2="12" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round" />
    <line x1="20" y1="16" x2="30" y2="16" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round" />
  </g>

  <!-- AI精灵主体 -->
  <g transform="translate(32, 26)">
    <!-- 小翅膀（左侧）-->
    <path d="M-12 2 Q-18 -2 -16 6 Q-14 10 -10 8 Z" fill="#A855F7" opacity="0.6" />
    <!-- 小翅膀（右侧）-->
    <path d="M12 2 Q18 -2 16 6 Q14 10 10 8 Z" fill="#A855F7" opacity="0.6" />

    <!-- 身体（更圆润、有肉感）-->
    <ellipse cx="0" cy="8" rx="7" ry="9" fill="url(#spriteGradient)" />
    
    <!-- 头部（圆形，更像精灵）-->
    <circle cx="0" cy="0" r="11" fill="url(#spriteGradient)" />
    
    <!-- 尖尖的精灵耳朵（左）-->
    <path d="M-11 -2 Q-16 -8 -9 -5 Q-7 -3 -9 0 Z" fill="url(#spriteGradient)" stroke="#F472B6" stroke-width="1" />
    <!-- 尖尖的精灵耳朵（右）-->
    <path d="M11 -2 Q16 -8 9 -5 Q7 -3 9 0 Z" fill="url(#spriteGradient)" stroke="#F472B6" stroke-width="1" />
    
    <!-- 头顶魔法光环 -->
    <ellipse cx="0" cy="-14" rx="9" ry="4" fill="url(#magicGradient)" opacity="0.8" filter="url(#glow)" />
    <ellipse cx="0" cy="-14" rx="6" ry="2.5" fill="white" opacity="0.9" />
    
    <!-- 左眼（更有神）-->
    <ellipse cx="-3.5" cy="-1" rx="2.5" ry="3" fill="#7C3AED" />
    <circle cx="-2.8" cy="-1.8" r="1" fill="white" />
    <!-- 左眼高光点 -->
    <circle cx="-4.2" cy="-0.2" r="0.5" fill="white" opacity="0.7" />
    
    <!-- 右眼（更有神）-->
    <ellipse cx="3.5" cy="-1" rx="2.5" ry="3" fill="#7C3AED" />
    <circle cx="4.2" cy="-1.8" r="1" fill="white" />
    <!-- 右眼高光点 -->
    <circle cx="2.8" cy="-0.2" r="0.5" fill="white" opacity="0.7" />
    
    <!-- 微笑（更明显）-->
    <path d="M-3 4 Q0 7 3 4" stroke="#7C3AED" stroke-width="2" fill="none" stroke-linecap="round" />
    
    <!-- 腮红（更明显）-->
    <ellipse cx="-6" cy="2" rx="2" ry="1.5" fill="#EC4899" opacity="0.6" />
    <ellipse cx="6" cy="2" rx="2" ry="1.5" fill="#EC4899" opacity="0.6" />

    <!-- 小鼻子 -->
    <ellipse cx="0" cy="2" rx="1" ry="0.8" fill="#F472B6" opacity="0.5" />
  </g>

  <!-- 手臂（抱着书）-->
  <path d="M28 30 Q24 34 24 40" stroke="url(#spriteGradient)" stroke-width="3.5" fill="none" stroke-linecap="round" />
  <path d="M36 30 Q40 34 40 40" stroke="url(#spriteGradient)" stroke-width="3.5" fill="none" stroke-linecap="round" />

  <!-- 魔法星光装饰 -->
  <!-- 左上角星星 -->
  <path d="M12 10 L14 14 L18 16 L14 18 L12 22 L10 18 L6 16 L10 14 Z" fill="url(#starGradient)" filter="url(#glow)" />
  <!-- 右上角星星 -->
  <path d="M50 8 L51 11 L54 12 L51 13 L50 16 L49 13 L46 12 L49 11 Z" fill="url(#starGradient)" filter="url(#glow)" />
  <!-- 左下角星星 -->
  <path d="M8 48 L9 51 L12 52 L9 53 L8 56 L7 53 L4 52 L7 51 Z" fill="url(#starGradient)" filter="url(#glow)" />
  <!-- 右下角星星 -->
  <path d="M56 44 L57 47 L60 48 L57 49 L56 52 L55 49 L52 48 L55 47 Z" fill="url(#starGradient)" filter="url(#glow)" />

  <!-- 创意点装饰 -->
  <circle cx="20" cy="52" r="2" fill="#EC4899" opacity="0.7" />
  <circle cx="44" cy="54" r="1.5" fill="#7C3AED" opacity="0.7" />
  <circle cx="54" cy="24" r="2" fill="#06B6D4" opacity="0.7" />
  <circle cx="10" cy="24" r="1.5" fill="#F472B6" opacity="0.7" />

  <!-- 魔法粒子效果 -->
  <circle cx="16" cy="16" r="1" fill="white" opacity="0.6" />
  <circle cx="48" cy="20" r="0.8" fill="white" opacity="0.6" />
  <circle cx="14" cy="44" r="1" fill="white" opacity="0.6" />
  <circle cx="50" cy="36" r="0.8" fill="white" opacity="0.6" />
</svg>
