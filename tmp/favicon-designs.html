<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网站图标设计方案</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 40px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 50px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 50px rgba(0,0,0,0.3);
        }

        .icon-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            background: #f0f0f0;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .icon-container svg {
            width: 80px;
            height: 80px;
        }

        .card h2 {
            color: #333;
            margin: 0 0 10px 0;
            font-size: 1.4em;
        }

        .card p {
            color: #666;
            margin: 0;
            line-height: 1.6;
            font-size: 0.95em;
        }

        .preview-text {
            text-align: center;
            color: white;
            margin-top: 50px;
            font-size: 1.1em;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 网站图标设计方案</h1>

        <div class="grid">
            <!-- 方案1: 魔法绘本 -->
            <div class="card">
                <div class="icon-container">
                    <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
                            </linearGradient>
                        </defs>
                        <rect x="8" y="12" width="48" height="40" rx="4" fill="url(#gradient1)" />
                        <rect x="30" y="12" width="4" height="40" fill="rgba(255,255,255,0.3)" />
                        <rect x="12" y="16" width="14" height="32" rx="2" fill="rgba(255,255,255,0.2)" />
                        <rect x="38" y="16" width="14" height="32" rx="2" fill="rgba(255,255,255,0.2)" />
                        <path d="M32 22 L34 28 L40 28 L35 32 L37 38 L32 34 L27 38 L29 32 L24 28 L30 28 Z" fill="white" />
                    </svg>
                </div>
                <h2>方案1: 魔法绘本</h2>
                <p>紫色到青色的渐变书本，中间有个白色星星，简洁醒目</p>
            </div>

            <!-- 方案2: 梦幻云朵绘本 -->
            <div class="card">
                <div class="icon-container">
                    <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#A855F7;stop-opacity:1" />
                                <stop offset="50%" style="stop-color:#EC4899;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
                            </linearGradient>
                        </defs>
                        <ellipse cx="20" cy="32" rx="14" ry="12" fill="url(#gradient2)" />
                        <ellipse cx="32" cy="26" rx="16" ry="14" fill="url(#gradient2)" />
                        <ellipse cx="44" cy="32" rx="14" ry="12" fill="url(#gradient2)" />
                        <rect x="12" y="36" width="40" height="16" rx="6" fill="url(#gradient2)" />
                        <rect x="26" y="30" width="12" height="14" rx="2" fill="white" />
                        <rect x="30" y="30" width="2" height="14" fill="#7C3AED" />
                        <circle cx="18" cy="22" r="2" fill="white" opacity="0.8" />
                        <circle cx="46" cy="24" r="1.5" fill="white" opacity="0.6" />
                    </svg>
                </div>
                <h2>方案2: 梦幻云朵绘本</h2>
                <p>三色渐变的可爱云朵，里面有个小书本，童趣十足</p>
            </div>

            <!-- 方案3: 创意画笔 -->
            <div class="card">
                <div class="icon-container">
                    <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <linearGradient id="gradient3" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#F472B6;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
                            </linearGradient>
                            <linearGradient id="gradient4" x1="0%" y1="100%" x2="0%" y2="0%">
                                <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#22D3EE;stop-opacity:1" />
                            </linearGradient>
                        </defs>
                        <path d="M24 48 L40 48 L36 16 L28 16 Z" fill="url(#gradient3)" />
                        <rect x="28" y="10" width="8" height="6" fill="url(#gradient4)" rx="1" />
                        <circle cx="16" cy="52" r="3" fill="#F472B6" />
                        <circle cx="24" cy="56" r="2.5" fill="#06B6D4" />
                        <circle cx="40" cy="56" r="3" fill="#7C3AED" />
                        <circle cx="48" cy="52" r="2" fill="#EC4899" />
                        <path d="M52 12 L54 18 L60 20 L54 22 L52 28 L50 22 L44 20 L50 18 Z" fill="#FBBF24" />
                    </svg>
                </div>
                <h2>方案3: 创意画笔</h2>
                <p>粉色到紫色的画笔，周围有彩色创意点和星星闪光</p>
            </div>

            <!-- 方案4: 爱心绘本 -->
            <div class="card">
                <div class="icon-container">
                    <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <linearGradient id="gradient5" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#EC4899;stop-opacity:1" />
                                <stop offset="50%" style="stop-color:#A855F7;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
                            </linearGradient>
                        </defs>
                        <circle cx="32" cy="32" r="30" fill="url(#gradient5)" />
                        <rect x="20" y="24" width="24" height="20" rx="3" fill="white" />
                        <rect x="30" y="24" width="4" height="20" fill="rgba(124,58,237,0.2)" />
                        <path d="M32 14 C30 12 26 12 24 14 C22 16 22 18 24 20 L32 28 L40 20 C42 18 42 16 40 14 C38 12 34 12 32 14" fill="white" opacity="0.9" />
                    </svg>
                </div>
                <h2>方案4: 爱心绘本</h2>
                <p>圆形渐变背景，里面有书本和爱心，温暖治愈</p>
            </div>

            <!-- 方案5: 梦幻城堡绘本 -->
            <div class="card">
                <div class="icon-container">
                    <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <linearGradient id="gradient6" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
                            </linearGradient>
                        </defs>
                        <rect x="16" y="32" width="32" height="24" rx="2" fill="url(#gradient6)" />
                        <rect x="14" y="20" width="10" height="12" rx="1" fill="#A855F7" />
                        <rect x="27" y="16" width="10" height="16" rx="1" fill="#A855F7" />
                        <rect x="40" y="20" width="10" height="12" rx="1" fill="#A855F7" />
                        <path d="M14 20 L19 12 L24 20 Z" fill="#F472B6" />
                        <path d="M27 16 L32 6 L37 16 Z" fill="#F472B6" />
                        <path d="M40 20 L45 12 L50 20 Z" fill="#F472B6" />
                        <rect x="29" y="38" width="6" height="8" rx="3" fill="rgba(255,255,255,0.8)" />
                        <circle cx="24" cy="44" r="1.5" fill="white" />
                        <circle cx="40" cy="44" r="1.5" fill="white" />
                    </svg>
                </div>
                <h2>方案5: 梦幻城堡</h2>
                <p>紫色城堡，粉色塔顶，充满童话色彩</p>
            </div>
        </div>

        <div class="preview-text">
            💡 提示：鼠标悬停在卡片上可以看到放大效果
        </div>
    </div>
</body>
</html>
