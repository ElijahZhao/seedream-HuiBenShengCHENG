name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Read version
        id: version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $TAG_VERSION"

  build-windows:
    needs: prepare
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install dependencies
        run: pnpm install
      - name: Build frontend
        env:
          TAURI_BUILD: 1
        run: pnpm next build
      - name: Build Tauri
        run: pnpm tauri:build
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: seedream-windows
          path: src-tauri/target/release/bundle/nsis/*.exe

  build-macos:
    needs: prepare
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install dependencies
        run: pnpm install
      - name: Build frontend
        env:
          TAURI_BUILD: 1
        run: pnpm next build
      - name: Build Tauri
        run: pnpm tauri:build
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: seedream-macos
          path: src-tauri/target/release/bundle/dmg/*.dmg

  build-android:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Install Android SDK
        uses: android-actions/setup-android@v3
      - name: Install dependencies
        run: pnpm install
      - name: Build frontend
        env:
          TAURI_BUILD: 1
        run: pnpm next build
      - name: Sync Capacitor
        run: pnpm cap sync
      - name: Decode keystore
        run: |
          printf '%s' "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/seedream-release.jks
      - name: Build Release APK
        env:
          KEYSTORE_PATH: seedream-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd android
          ./gradlew assembleRelease
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: seedream-android
          path: android/app/build/outputs/apk/release/*.apk

  publish-release:
    needs: [build-windows, build-macos, build-android]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Rename artifacts
        run: |
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p release-assets
          for f in artifacts/seedream-windows/*.exe; do
            cp "$f" "release-assets/Seedream-${VERSION}-Windows-x64.exe"
          done
          for f in artifacts/seedream-macos/*.dmg; do
            cp "$f" "release-assets/Seedream-${VERSION}-macOS.dmg"
          done
          for f in artifacts/seedream-android/*.apk; do
            cp "$f" "release-assets/Seedream-${VERSION}-Android.apk"
          done
          ls -la release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Seedream ${{ github.ref_name }}"
          generate_release_notes: true
          files: release-assets/*
