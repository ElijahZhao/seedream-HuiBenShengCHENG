name: Build Seedream App

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  # 桌面端 Windows
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install dependencies
        run: pnpm install
      - name: Build frontend
        run: pnpm next build
      - name: Build Tauri
        env:
          TAURI_BUILD: 1
        run: pnpm tauri:build
      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: seedream-windows
          path: src-tauri/target/release/bundle/nsis/*.exe

  # 桌面端 Mac
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install dependencies
        run: pnpm install
      - name: Build frontend
        run: pnpm next build
      - name: Build Tauri
        env:
          TAURI_BUILD: 1
        run: pnpm tauri:build
      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: seedream-macos
          path: src-tauri/target/release/bundle/dmg/*.dmg

  # 移动端 Android
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Install Android SDK
        uses: android-actions/setup-android@v3
      - name: Install dependencies
        run: pnpm install
      - name: Build frontend
        run: pnpm next build
      - name: Sync Capacitor
        env:
          TAURI_BUILD: 1
        run: pnpm cap sync
      - name: Decode keystore
        run: |
          printf '%s' "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/seedream-release.jks
      - name: Build Release APK
        env:
          KEYSTORE_PATH: seedream-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd android
          ./gradlew assembleRelease
      - name: Upload apk
        uses: actions/upload-artifact@v4
        with:
          name: seedream-android
          path: android/app/build/outputs/apk/release/*.apk
