name: Build Seedream App

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  # 桌面端 Windows
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install dependencies
        run: pnpm install
      - name: Build frontend
        run: pnpm next build
      - name: Build Tauri
        run: pnpm tauri:build
      - name: Upload exe
        uses: actions/upload-artifact@v4
        with:
          name: seedream-windows
          path: src-tauri/target/release/seedream.exe

  # 桌面端 Mac
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install dependencies
        run: pnpm install
      - name: Build frontend
        run: pnpm next build
      - name: Build Tauri
        run: pnpm tauri:build
      - name: Upload macOS binary
        uses: actions/upload-artifact@v4
        with:
          name: seedream-macos
          path: src-tauri/target/release/seedream

  # 移动端 Android
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Install Android SDK
        uses: android-actions/setup-android@v3
      - name: Install dependencies
        run: pnpm install
      - name: Build frontend
        run: pnpm next build
      - name: Sync Capacitor
        run: pnpm cap sync
      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug
      - name: Upload apk
        uses: actions/upload-artifact@v4
        with:
          name: seedream-android
          path: android/app/build/outputs/apk/debug/*.apk
